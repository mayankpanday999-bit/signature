<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Cart Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#e9f8ff,#f7fcff,#dff4ff);
      min-height:100vh;
      padding:40px;
      overflow-x:hidden;
      animation:fadeBody 1s ease;
    }

    @keyframes fadeBody{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .container{
      max-width:1300px;
      margin:auto;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:30px;
    }

    .cart-items,
    .summary{
      background:rgba(255,255,255,0.6);
      backdrop-filter:blur(20px);
      border-radius:30px;
      padding:30px;
      box-shadow:0 15px 40px rgba(0,0,0,0.08);
      border:1px solid rgba(255,255,255,0.4);
      animation:slideUp 1s ease;
    }

    @keyframes slideUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .cart-items h2,
    .summary h2{
      color:#003566;
      margin-bottom:25px;
      font-size:28px;
    }

    .cart-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:20px 0;
      border-bottom:1px solid rgba(0,0,0,0.08);
      transition:0.4s;
    }

    .cart-item:hover{
      transform:translateY(-5px);
    }

    .cart-item img{
      width:100px;
      height:100px;
      border-radius:18px;
      object-fit:cover;
      box-shadow:0 10px 20px rgba(0,0,0,0.12);
      transition:0.4s;
    }

    .cart-item:hover img{
      transform:scale(1.05);
    }

    .item-info{
      flex:1;
      padding:0 10px;
    }

    .item-info h3{
      color:#003566;
      font-size:20px;
      margin-bottom:8px;
    }

    .item-info p{
      color:#0077b6;
      font-size:18px;
      font-weight:600;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:10px;
      background:#f4fbff;
      padding:10px 15px;
      border-radius:50px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    .qty-box button{
      width:35px;
      height:35px;
      border:none;
      border-radius:50%;
      background:linear-gradient(135deg,#00b4d8,#0077b6);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .qty-box button:hover{
      transform:scale(1.1);
    }

    .qty-box span{
      font-size:18px;
      font-weight:600;
      color:#003566;
      min-width:20px;
      text-align:center;
    }

    .checkout-btn{
      display:block;
      width:100%;
      padding:16px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#00b4d8,#0077b6);
      color:white;
      text-align:center;
      text-decoration:none;
      font-weight:600;
      margin-top:20px;
      transition:0.4s;
      box-shadow:0 10px 25px rgba(0,119,182,0.25);
    }

    .checkout-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 35px rgba(0,119,182,0.35);
    }

    .summary p,
    .summary h3{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      color:#444;
      font-size:16px;
    }

    .summary h3{
      font-size:24px;
      color:#003566;
      margin-top:25px;
      padding-top:20px;
      border-top:1px solid rgba(0,0,0,0.08);
    }

    @media(max-width:992px){
      .container{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:768px){
      body{
        padding:20px;
      }

      .cart-item{
        flex-direction:column;
        align-items:flex-start;
      }

      .qty-box{
        margin-top:10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="cart-items">

      <h2>Review Your Selected Water Bottles :</h2>

      <div class="cart-item">
        <img src="local.jpeg">

        <div class="item-info">
          <h3>500ml Everyday Water Bottle</h3>
          <p>₹49</p>
        </div>

        <div class="qty-box">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>
      </div>

      <div class="cart-item">
        <img src="premium.jpg">

        <div class="item-info">
          <h3>950ml Sparkling Water Bottle</h3>
          <p>₹299</p>
        </div>

        <div class="qty-box">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>
      </div>

      <a href="index.html" class="checkout-btn">Continue Shopping</a>
    </div>

    <div class="summary">
      <h2>Order Summary</h2>

      <p>
        <span>Subtotal</span>
        <span>₹348</span>
      </p>

      <p>
        <span>Shipping</span>
        <span>₹50</span>
      </p>

      <h3>
        <span>Total</span>
        <span>₹398</span>
      </h3>

      <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
    </div>

  </div>

</body>
</html>
