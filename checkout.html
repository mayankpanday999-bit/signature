<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:#f4fbff;padding:40px;}
    .checkout-container{max-width:1100px;margin:auto;display:grid;grid-template-columns:2fr 1fr;gap:30px;}
    .form-box,.order-box{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
    h2{margin-bottom:20px;color:#00457c;}
    input,textarea{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
    }
    .place-order{
      width:100%;
      padding:15px;
      border:none;
      background:linear-gradient(90deg,#00c3ff,#0056b3);
      color:white;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      font-weight:600;
    }
    .checkout-btn{
  display:inline-block;
  margin-bottom:20px;
  padding:12px 20px;
  background:linear-gradient(90deg,#00c3ff,#0056b3);
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-weight:600;
  transition:0.3s;
}

.checkout-btn:hover{
  opacity:0.9;
}
  </style>
</head>
<body>
    <a href="cart.html" class="checkout-btn">Back to Cart</a>
  <div class="checkout-container">
    <div class="form-box">
      <h2>Billing Details</h2>
      <input type="text" placeholder="Full Name">
      <input type="email" placeholder="Email Address">
      <input type="text" placeholder="Phone Number">
      <textarea rows="5" placeholder="Delivery Address"></textarea>
      <button class="place-order">Place Order</button>
    </div>

    <div class="order-box">
      <h2>Your Order</h2>
      <p>500ml Everyday Water Bottle × 1</p>
      <p>950ml Sparkling Water Bottle × 1</p>
      <hr style="margin:15px 0;">
      <p>Subtotal: ₹348</p>
      <p>Shipping: ₹50</p>
      <h3>Total: ₹398</h3>
    </div>
  </div>
  
</body>
</html>
